version: "3.9"

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"   # FastAPI gateway
      - "4000:4000"   # LiteLLM proxy (also accessible directly)
    environment:
      - LITELLM_MASTER_KEY=sk-murugan-gateway-2024
      - LITELLM_PORT=4000
      - GATEWAY_URL=http://localhost:8000
    volumes:
      - ./backend/providers.db:/app/providers.db
      - ./backend/litellm_config.yaml:/app/litellm_config.yaml
    restart: unless-stopped
